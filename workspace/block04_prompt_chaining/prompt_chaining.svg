<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, sans-serif">

  <rect width="720" height="520" fill="#0f1117"/>

  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Workflow: Prompt Chaining — Последовательность подсказок</text>
  <text x="360" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Задача разбивается на шаги. Каждый LLM-вызов обрабатывает результат предыдущего.</text>

  <!-- Шаг 1 -->
  <rect x="30" y="80" width="120" height="50" rx="10" fill="#1e2130" stroke="#6366f1" stroke-width="1.5"/>
  <text x="90" y="101" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Входные</text>
  <text x="90" y="118" text-anchor="middle" fill="#a5b4fc" font-size="11">данные</text>

  <line x1="150" y1="105" x2="178" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LLM 1 -->
  <rect x="178" y="80" width="100" height="50" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="228" y="101" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">LLM</text>
  <text x="228" y="118" text-anchor="middle" fill="#c7d2fe" font-size="10">вызов 1</text>

  <!-- Gate 1 -->
  <line x1="278" y1="105" x2="306" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="318,90 338,105 318,120" fill="#1e2130" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="328" y="142" text-anchor="middle" fill="#f59e0b" font-size="9">gate</text>

  <!-- провал gate -->
  <line x1="328" y1="120" x2="328" y2="160" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrR)"/>
  <rect x="278" y="160" width="100" height="34" rx="8" fill="#1e1b1b" stroke="#f87171" stroke-width="1"/>
  <text x="328" y="178" text-anchor="middle" fill="#f87171" font-size="10">стоп / повтор</text>

  <!-- продолжение -->
  <line x1="338" y1="105" x2="366" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LLM 2 -->
  <rect x="366" y="80" width="100" height="50" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="416" y="101" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">LLM</text>
  <text x="416" y="118" text-anchor="middle" fill="#c7d2fe" font-size="10">вызов 2</text>

  <line x1="466" y1="105" x2="494" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LLM 3 -->
  <rect x="494" y="80" width="100" height="50" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="544" y="101" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">LLM</text>
  <text x="544" y="118" text-anchor="middle" fill="#c7d2fe" font-size="10">вызов 3</text>

  <line x1="594" y1="105" x2="622" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Результат -->
  <rect x="622" y="80" width="80" height="50" rx="10" fill="#1e2130" stroke="#10b981" stroke-width="1.5"/>
  <text x="662" y="101" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">Итог</text>
  <text x="662" y="118" text-anchor="middle" fill="#6ee7b7" font-size="10">готово ✓</text>

  <!-- Легенда gate -->
  <rect x="30" y="155" width="220" height="50" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="174" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">Gate — программная проверка</text>
  <text x="140" y="192" text-anchor="middle" fill="#94a3b8" font-size="10">Останавливает цепочку если результат</text>
  <text x="140" y="205" text-anchor="middle" fill="#94a3b8" font-size="10">не соответствует критериям качества</text>

  <!-- Divider -->
  <line x1="30" y1="228" x2="690" y2="228" stroke="#1e293b" stroke-width="1"/>

  <!-- Примеры -->
  <text x="360" y="252" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Примеры из статьи</text>

  <!-- Пример 1 -->
  <rect x="30" y="268" width="320" height="100" rx="10" fill="#1a1f2e" stroke="#6366f1" stroke-width="1"/>
  <text x="190" y="290" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Написание документа</text>
  <text x="50" y="312" fill="#94a3b8" font-size="10">① Написать структуру документа</text>
  <text x="50" y="330" fill="#94a3b8" font-size="10">② Gate: проверить что структура верная</text>
  <text x="50" y="348" fill="#94a3b8" font-size="10">③ Написать документ по структуре</text>

  <!-- Пример 2 -->
  <rect x="370" y="268" width="320" height="100" rx="10" fill="#1a1f2e" stroke="#6366f1" stroke-width="1"/>
  <text x="530" y="290" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Маркетинговый контент</text>
  <text x="390" y="312" fill="#94a3b8" font-size="10">① Написать маркетинговый текст</text>
  <text x="390" y="330" fill="#94a3b8" font-size="10">② Gate: проверить тон и соответствие</text>
  <text x="390" y="348" fill="#94a3b8" font-size="10">③ Перевести на другой язык</text>

  <!-- Когда использовать -->
  <rect x="30" y="386" width="660" height="110" rx="10" fill="#111827" stroke="#10b981" stroke-width="1"/>
  <text x="360" y="408" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">Когда использовать Prompt Chaining</text>

  <rect x="50" y="420" width="190" height="60" rx="8" fill="#1e2130" stroke="#4ade80" stroke-width="1"/>
  <text x="145" y="440" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">✓ Подходит</text>
  <text x="145" y="458" text-anchor="middle" fill="#94a3b8" font-size="10">Задача делится на</text>
  <text x="145" y="472" text-anchor="middle" fill="#94a3b8" font-size="10">чёткие независимые шаги</text>

  <rect x="265" y="420" width="190" height="60" rx="8" fill="#1e2130" stroke="#4ade80" stroke-width="1"/>
  <text x="360" y="440" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">✓ Подходит</text>
  <text x="360" y="458" text-anchor="middle" fill="#94a3b8" font-size="10">Качество важнее скорости</text>
  <text x="360" y="472" text-anchor="middle" fill="#94a3b8" font-size="10">каждый шаг проще = точнее</text>

  <rect x="480" y="420" width="190" height="60" rx="8" fill="#1e2130" stroke="#f87171" stroke-width="1"/>
  <text x="575" y="440" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">✗ Не подходит</text>
  <text x="575" y="458" text-anchor="middle" fill="#94a3b8" font-size="10">Задача непредсказуема</text>
  <text x="575" y="472" text-anchor="middle" fill="#94a3b8" font-size="10">шаги неизвестны заранее</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

</svg>
