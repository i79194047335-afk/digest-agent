<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" font-family="system-ui, sans-serif">

  <rect width="720" height="620" fill="#0f1117"/>

  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Workflow: Orchestrator-Subagents — Динамическое планирование</text>
  <text x="360" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Оркестратор сам решает какие углы исследовать — заранее они не известны</text>

  <!-- Входящий запрос -->
  <rect x="280" y="70" width="160" height="44" rx="10" fill="#1e2130" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="88" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Запрос: "deep"</text>
  <text x="360" y="104" text-anchor="middle" fill="#818cf8" font-size="10">тема: DeFi-арбитраж</text>

  <line x1="360" y1="114" x2="360" y2="138" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- ORCHESTRATOR -->
  <rect x="230" y="138" width="260" height="64" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="158" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="700">ORCHESTRATOR.md</text>
  <text x="360" y="174" text-anchor="middle" fill="#a5b4fc" font-size="10">классифицирует + сам пишет план</text>
  <text x="360" y="190" text-anchor="middle" fill="#a5b4fc" font-size="10">углы решает заново для каждой темы</text>

  <line x1="360" y1="202" x2="360" y2="226" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- research_plan.md -->
  <rect x="245" y="228" width="230" height="48" rx="10" fill="#1a1f2e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="360" y="248" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">research_plan.md</text>
  <text x="360" y="264" text-anchor="middle" fill="#94a3b8" font-size="9">3 угла без перекрытия — для ЭТОЙ темы</text>

  <line x1="360" y1="276" x2="360" y2="300" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrPu)"/>

  <!-- deep_digest.md -->
  <rect x="245" y="302" width="230" height="44" rx="10" fill="#1a1f2e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="320" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">deep_digest.md</text>
  <text x="360" y="336" text-anchor="middle" fill="#94a3b8" font-size="9">читает план → запускает researcher.md ×N</text>

  <!-- три стрелки вниз к researcher.md -->
  <line x1="220" y1="346" x2="150" y2="392" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrP)"/>
  <line x1="360" y1="346" x2="360" y2="392" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrP)"/>
  <line x1="500" y1="346" x2="570" y2="392" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- Researcher 1 -->
  <rect x="60" y="392" width="160" height="76" rx="10" fill="#1a1f2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="140" y="412" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">researcher.md</text>
  <text x="140" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">тот же файл,</text>
  <text x="140" y="442" text-anchor="middle" fill="#94a3b8" font-size="9">разное задание</text>
  <text x="140" y="458" text-anchor="middle" fill="#6ee7b7" font-size="9">угол 1: механика AMM</text>

  <!-- Researcher 2 -->
  <rect x="280" y="392" width="160" height="76" rx="10" fill="#1a1f2e" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="360" y="412" text-anchor="middle" fill="#0ea5e9" font-size="11" font-weight="700">researcher.md</text>
  <text x="360" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">тот же файл,</text>
  <text x="360" y="442" text-anchor="middle" fill="#94a3b8" font-size="9">разное задание</text>
  <text x="360" y="458" text-anchor="middle" fill="#7dd3fc" font-size="9">угол 2: исполнение</text>

  <!-- Researcher 3 -->
  <rect x="500" y="392" width="160" height="76" rx="10" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="580" y="412" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">researcher.md</text>
  <text x="580" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">тот же файл,</text>
  <text x="580" y="442" text-anchor="middle" fill="#94a3b8" font-size="9">разное задание</text>
  <text x="580" y="458" text-anchor="middle" fill="#fcd34d" font-size="9">угол 3: экономика риска</text>

  <!-- стрелки вниз к research_N.md -->
  <line x1="140" y1="468" x2="140" y2="492" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="360" y1="468" x2="360" y2="492" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="580" y1="468" x2="580" y2="492" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrY)"/>

  <!-- research_N.md файлы -->
  <rect x="60" y="494" width="160" height="32" rx="8" fill="#0d1f18" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="514" text-anchor="middle" fill="#6ee7b7" font-size="10">research_1.md</text>

  <rect x="280" y="494" width="160" height="32" rx="8" fill="#0c1f2d" stroke="#0ea5e9" stroke-width="1"/>
  <text x="360" y="514" text-anchor="middle" fill="#7dd3fc" font-size="10">research_2.md</text>

  <rect x="500" y="494" width="160" height="32" rx="8" fill="#1f1500" stroke="#f59e0b" stroke-width="1"/>
  <text x="580" y="514" text-anchor="middle" fill="#fcd34d" font-size="10">research_3.md</text>

  <!-- стрелки к writer -->
  <line x1="140" y1="526" x2="310" y2="556" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="360" y1="526" x2="360" y2="552" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="580" y1="526" x2="410" y2="556" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrY)"/>

  <!-- writer.md -->
  <rect x="255" y="554" width="210" height="44" rx="10" fill="#1a1f2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="360" y="572" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">writer.md</text>
  <text x="360" y="588" text-anchor="middle" fill="#94a3b8" font-size="9">1 раздел на угол, ровно 150 слов</text>

  <defs>
    <marker id="arrP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrPu" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrY" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

</svg>
